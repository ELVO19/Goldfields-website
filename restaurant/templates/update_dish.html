{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Dish</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/main.css'%}">

<style>
:root {
    --primary-red: #DC2626;
    --red-light: #EF4444;
    --red-dark: #B91C1C;
    --black: #0F0F0F;
    --dark-gray: #1F1F1F;
    --light-gray: #374151;
    --gray: #9CA3AF;
}

body {
    background: linear-gradient(135deg, var(--dark-gray) 0%, var(--black) 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    color: #E5E7EB;
}

/* Navbar */
.navbar {
    background: var(--black) !important;
    box-shadow: 0 4px 20px rgba(220, 38, 38, 0.25);
    padding: 1rem 0;
    border-bottom: 1px solid var(--red-dark);
}

.navbar-brand {
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--primary-red) !important;
    text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
}

/* Main container */
.main-container {
    max-width: 600px;
    margin: auto;
    padding: 3rem 1rem;
}

h2 {
    color: var(--primary-red);
    font-weight: 700;
    margin-bottom: 25px;
    text-shadow: 0 0 15px rgba(220, 38, 38, 0.3);
}

/* Form card */
.form-card {
    background: var(--dark-gray);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
    border: 1px solid var(--light-gray);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.form-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary-red), var(--red-light));
    box-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
}

.form-card:hover {
    box-shadow: 0 20px 55px rgba(220, 38, 38, 0.25), 0 0 30px rgba(220, 38, 38, 0.1);
    transform: translateY(-5px);
    border-color: var(--primary-red);
}

/* Labels */
.form-label {
    color: #F9FAFB;
    font-weight: 600;
    margin-bottom: 0.5rem;
}

/* Inputs */
.form-control {
    background: var(--black);
    border: 1px solid var(--light-gray);
    border-radius: 12px;
    padding: 12px 16px;
    color: #E5E7EB;
    transition: all 0.3s ease;
}

.form-control:focus {
    background: var(--black);
    border-color: var(--primary-red);
    box-shadow: 0 0 0 0.2rem rgba(220, 38, 38, 0.25);
    color: #E5E7EB;
    transform: translateY(-1px);
}

.form-control::placeholder {
    color: var(--gray);
}

/* Image preview */
.preview-img {
    width: 150px;
    height: 150px;
    border-radius: 12px;
    margin-top: 10px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    border: 2px solid var(--light-gray);
    object-fit: cover;
    transition: all 0.3s ease;
}

.preview-img:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 30px rgba(220, 38, 38, 0.3);
    border-color: var(--primary-red);
}

/* Buttons */
.btn-update {
    background: linear-gradient(135deg, var(--primary-red), var(--red-light));
    border: none;
    border-radius: 40px;
    padding: 12px 30px;
    font-weight: 600;
    color: white;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
}

.btn-update:hover {
    background: linear-gradient(135deg, var(--red-dark), var(--primary-red));
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(220, 38, 38, 0.5);
    color: white !important;
}

.btn-update::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

.btn-update:hover::before {
    left: 100%;
}

.btn-cancel {
    background: var(--light-gray);
    color: #E5E7EB;
    border-radius: 40px;
    padding: 12px 30px;
    font-weight: 500;
    border: 1px solid var(--light-gray);
    transition: all 0.3s ease;
}

.btn-cancel:hover {
    background: var(--gray);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

/* Responsive */
@media (max-width: 768px) {
    .main-container {
        padding: 1.5rem 1rem;
    }

    .form-card {
        padding: 20px;
    }

    .preview-img {
        width: 120px;
        height: 120px;
    }
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="{% url 'admin_page' %}">🍽️ Nexxa Hotels</a>
</div>
</nav>

<div class="main-container">

<h2>Update Dish</h2>

<div class="form-card">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Dish Name</label>
<input type="text" name="name" value="{{ dish.name }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="3" required>{{ dish.description }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" step="0.01" name="price" value="{{ dish.price }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Current Image</label><br>

{% if dish.image %}
<img src="{{ dish.image.url }}" alt="{{ dish.name }}" class="preview-img">
{% endif %}

</div>

<div class="mb-3">
<label class="form-label">Change Image</label>
<input type="file" name="image" class="form-control" accept="image/*">
</div>

<div class="d-flex gap-3 mt-4">
<button class="btn btn-update">Update Dish</button>
<a href="{% url 'menu' %}" class="btn btn-cancel">Cancel</a>
</div>

</form>

</div>

</div>

</body>
</html>
