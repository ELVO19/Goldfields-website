{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #FF6B35;
            --orange-light: #FF8C42;
            --orange-dark: #E55A2B;
            --black: #0F0F0F;
            --dark-gray: #1A1A1A;
            --darker-gray: #111111;
            --light-gray: #B0B3B8;
            --text-light: #E5E7EB;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--black) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            color: var(--text-light);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-orange), var(--orange-light));
            opacity: 0.1;
            animation: float 18s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 250px;
            height: 250px;
            top: 15%;
            left: 10%;
            animation-delay: 2s;
        }

        .circle:nth-child(2) {
            width: 180px;
            height: 180px;
            bottom: 25%;
            right: 12%;
            animation-delay: 6s;
        }

        .circle:nth-child(3) {
            width: 140px;
            height: 140px;
            top: 70%;
            right: 20%;
            animation-delay: 11s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) scale(1) rotate(0deg);
            }
            33% {
                transform: translateY(-25px) scale(1.15) rotate(120deg);
            }
            66% {
                transform: translateY(-12px) scale(0.92) rotate(240deg);
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary-orange);
            border-radius: 50%;
            animation: particleFloat 10s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1);
                opacity: 0;
            }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, var(--darker-gray), var(--dark-gray));
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow:
                0 40px 90px rgba(0,0,0,0.7),
                0 0 60px rgba(255, 107, 53, 0.35);
            border: 1px solid rgba(255, 107, 53, 0.3);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(25px);
            animation: cardSlideUp 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-orange), var(--orange-light), var(--primary-orange));
            box-shadow: 0 0 30px rgba(255, 107, 53, 1);
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(70px) scale(0.93);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin-bottom: 2.5rem;
            font-size: clamp(1.9rem, 4.5vw, 2.6rem);
            background: linear-gradient(45deg, var(--primary-orange), var(--orange-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 2.2s ease-in-out infinite alternate;
            position: relative;
        }

        @keyframes titleGlow {
            from {
                filter: drop-shadow(0 0 15px rgba(255, 107, 53, 0.7));
            }
            to {
                filter: drop-shadow(0 0 35px rgba(255, 107, 53, 1));
            }
        }

        .form-label {
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 0.9rem;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: block;
        }

        .form-control {
            background: var(--black);
            border: 2px solid rgba(55, 65, 81, 0.65);
            border-radius: 18px;
            padding: 20px 25px;
            color: var(--text-light);
            font-size: 1.1rem;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-control:focus {
            border-color: var(--primary-orange);
            box-shadow:
                0 0 0 5px rgba(255, 107, 53, 0.25),
                0 0 40px rgba(255, 107, 53, 0.2);
            transform: translateY(-3px);
            background: var(--darker-gray);
            outline: none;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--primary-orange), var(--orange-light));
            color: white;
            padding: 20px 35px;
            border-radius: 28px;
            font-weight: 700;
            font-size: 1.2rem;
            border: none;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 18px 50px rgba(255, 107, 53, 0.5);
            margin-top: 1.2rem;
            font-family: 'Roboto', sans-serif;
        }

        .btn-orange::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.9s ease;
        }

        .btn-orange:hover::before {
            left: 100%;
        }

        .btn-orange:hover {
            background: linear-gradient(135deg, var(--orange-dark), var(--primary-orange));
            transform: translateY(-7px) scale(1.03);
            box-shadow: 0 30px 70px rgba(255, 107, 53, 0.7);
            color: white;
        }

        .btn-orange:active {
            transform: translateY(-4px) scale(0.985);
        }

        .signup-link {
            text-align: center;
            margin-top: 2.2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 107, 53, 0.25);
        }

        .signup-link span {
            color: var(--text-muted);
            font-size: 1rem;
            margin-right: 0.6rem;
        }

        .signup-link a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 10px 25px;
            border-radius: 22px;
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 107, 53, 0.12);
            backdrop-filter: blur(12px);
            position: relative;
        }

        .signup-link a:hover {
            color: white;
            background: linear-gradient(135deg, var(--primary-orange), var(--orange-light));
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.5);
        }

        /* Password toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary-orange);
            transform: translateY(-50%) scale(1.1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                margin: 1.5rem;
                padding: 2.2rem 1.8rem;
            }
        }

        /* Loading state */
        .loading {
            display: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Background Animations -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="particles" id="particles"></div>

    <div class="login-card">
        <h2 class="login-title">Welcome Back</h2>

        <form method="POST" action="{% url 'login' %}" id="loginForm">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="mb-4">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-orange">
                <span class="btn-text">Sign In</span>
                <span class="loading">
                    <span class="spinner"></span>
                    Signing In...
                </span>
            </button>
        </form>

        <div class="signup-link">
            <span>Don't have an account?</span>
            <a href="{% url 'signup' %}">Create Account</a>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 8) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Password visibility toggle
        let passwordVisible = false;
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const icon = document.querySelector('.password-toggle i');

            passwordVisible = !passwordVisible;
            passwordField.type = passwordVisible ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !passwordVisible);
            icon.classList.toggle('fa-eye-slash', passwordVisible);
        }

        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const submitBtn = this.querySelector('.btn-orange');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoading = submitBtn.querySelector('.loading');

            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            submitBtn.style.transform = 'scale(0.97)';
        });

        // Input focus animations
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.025)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Auto-focus username on page load
        document.querySelector('input[name="username"]').focus();

        // Initialize
        createParticles();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
